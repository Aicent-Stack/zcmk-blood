[package]
name = "zcmk"
description = "ZCMK: Real-Time Bid/Ask (RTBA) Zero-Commission Settlement Protocol [RFC-004]"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage = "http://zcmk.com"
documentation = "https://github.com/Aicent-Stack/manifesto/blob/main/rfcs/RFC-004-ZCMK-BLOOD.md"
keywords = ["hft", "micro-settlement", "rfc-004", "compute-market", "economic-homeostasis"]
categories = ["financial-services", "algorithms", "distributed-computing"]
rust-version = "1.75"

[dependencies]
# --- Core Organism Linking (L1 Metabolic Layer) ---
# ZCMK operates as a pure financial primitive. It consumes neural pulses (RTTP) 
# to execute atomic clearings. High-level cognitive orchestration (Aicent Brain) 
# is decoupled to maintain a strict unidirectional dependency graph.
rttp = { workspace = true }

# --- HFT-Grade Matching Engine ---
# [PERF] High-concurrency lock-free queues for nanosecond-speed auctioning
crossbeam-queue = { workspace = true }
parking_lot = { workspace = true }   # [PERF] HFT-grade synchronization primitives
num-traits = { version = "0.2", default-features = false } # [FINANCE] Precision math for picotoken (10^-12) arithmetic
once_cell = { workspace = true }     # Safe static initialization of the market manifold

# --- Logic & Telemetry ---
serde = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
tokio = { workspace = true, features = ["sync", "rt"] }
rand = { workspace = true }          # Chaos-testing the market pressure
tracing = { workspace = true }       # Financial telemetry for audit trails

[dev-dependencies]
# Benchmarking finality latency (<1ms targets)
criterion = { workspace = true }
